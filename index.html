<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <a href="animal-test.html" class="animal-test-link">🐾 동물상 테스트 해보기</a>
        <div id="numbers" class="numbers"></div>
        <button id="generate">Generate Numbers</button>

        <section class="contact">
            <h2>제휴 문의</h2>
            <form id="contact-form" action="https://formspree.io/f/xpqgqyqr" method="POST">
                <input type="text" name="name" placeholder="이름" required>
                <input type="email" name="email" placeholder="이메일" required>
                <textarea name="message" placeholder="문의 내용" rows="5" required></textarea>
                <button type="submit">보내기</button>
            </form>
            <p id="contact-status"></p>
        </section>
    </div>

    <section class="comments">
        <div id="disqus_thread"></div>
        <script>
            (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://joominkyuproject.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <script src="main.js"></script>
</body>
</html>
